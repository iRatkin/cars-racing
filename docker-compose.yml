name: mafinki

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.local
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-123456:test-token}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      MONGO_URI: mongodb://mongo:27017/mafinki
      NODE_ENV: ${NODE_ENV:-dev}
      PORT: 3000
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-dev-webhook-secret}
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--quiet"]
    logging:
      driver: "none"
    environment:
      MONGO_INITDB_DATABASE: mafinki
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'rs.status().ok' | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_started
    restart: on-failure
    command:
      [
        "mongosh",
        "mongo:27017",
        "--quiet",
        "--eval",
        "try { rs.status() } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }) }"
      ]

volumes:
  mongo-data:
