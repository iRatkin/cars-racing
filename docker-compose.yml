name: mafinki

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.local
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-123456:test-token}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      MONGO_URI: mongodb://mongo:27017/mafinki
      NODE_ENV: ${NODE_ENV:-dev}
      PORT: 3000
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-dev-webhook-secret}
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    entrypoint:
      - /bin/sh
      - -c
      - exec docker-entrypoint.sh mongod --quiet >/dev/null 2>&1
    logging:
      driver: "none"
    environment:
      MONGO_INITDB_DATABASE: mafinki
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[m]ongod' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
