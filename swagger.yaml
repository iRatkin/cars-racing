openapi: 3.0.3
info:
  title: Telegram Miniapp Cars API
  version: 0.3.0
  description: API for Telegram Mini App authentication, garage state, race coins purchase intents, car purchases, battle seasons with solo races and leaderboards, and Telegram payment webhooks.
servers:
  - url: http://localhost:3000
    description: Local Docker Compose API
tags:
  - name: Health
  - name: Auth
  - name: Garage
  - name: Purchases
  - name: Seasons
  - name: Telegram
paths:
  /health:
    get:
      tags:
        - Health
      summary: Check API health
      operationId: getHealth
      responses:
        "200":
          description: API is running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/auth/telegram:
    post:
      tags:
        - Auth
      summary: Authenticate a Telegram Mini App user
      operationId: authenticateTelegramUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramAuthRequest"
      responses:
        "200":
          description: Authentication succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramAuthResponse"
        "400":
          description: initData is missing or empty.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                initDataRequired:
                  value:
                    code: INIT_DATA_REQUIRED
        "401":
          description: Telegram init data is invalid or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                initDataInvalid:
                  value:
                    code: INIT_DATA_INVALID
  /v1/garage:
    get:
      tags:
        - Garage
      summary: Get the authenticated user's garage
      operationId: getGarage
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Garage state with active catalog cars and race coins balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GarageResponse"
        "401":
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unauthorized:
                  value:
                    code: UNAUTHORIZED
        "404":
          description: The authenticated user no longer exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                userNotFound:
                  value:
                    code: USER_NOT_FOUND
  /v1/purchases/coins-intents:
    post:
      tags:
        - Purchases
      summary: Create or reuse a race coins bundle purchase intent
      operationId: createCoinsPurchaseIntent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCoinsPurchaseIntentRequest"
      responses:
        "200":
          description: Invoice-ready purchase intent for race coins bundle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoinsPurchaseIntentResponse"
        "400":
          description: bundleId is missing or empty.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                bundleIdRequired:
                  value:
                    code: BUNDLE_ID_REQUIRED
        "401":
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unauthorized:
                  value:
                    code: UNAUTHORIZED
        "404":
          description: User or bundle was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                bundleNotFound:
                  value:
                    code: BUNDLE_NOT_FOUND
                userNotFound:
                  value:
                    code: USER_NOT_FOUND
  /v1/purchases/buy-car:
    post:
      tags:
        - Purchases
      summary: Buy a car with race coins
      operationId: buyCarWithRaceCoins
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyCarRequest"
      responses:
        "200":
          description: Car purchased successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyCarResponse"
        "400":
          description: carId is missing or empty.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                carIdRequired:
                  value:
                    code: CAR_ID_REQUIRED
        "401":
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unauthorized:
                  value:
                    code: UNAUTHORIZED
        "404":
          description: User or car was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                carNotFound:
                  value:
                    code: CAR_NOT_FOUND
                userNotFound:
                  value:
                    code: USER_NOT_FOUND
        "409":
          description: User already owns the requested car.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                alreadyOwned:
                  value:
                    code: CAR_ALREADY_OWNED
        "422":
          description: Car cannot be purchased or insufficient race coins balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notPurchasable:
                  value:
                    code: CAR_NOT_PURCHASABLE
                insufficientBalance:
                  value:
                    code: INSUFFICIENT_BALANCE
  /v1/seasons:
    get:
      tags:
        - Seasons
      summary: List active and upcoming battle seasons
      operationId: listSeasons
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Seasons the user may see with participation hints.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeasonListResponse"
        "401":
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/seasons/{seasonId}:
    get:
      tags:
        - Seasons
      summary: Get season details and participation status
      operationId: getSeasonById
      security:
        - bearerAuth: []
      parameters:
        - name: seasonId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Season detail for the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeasonDetailResponse"
        "400":
          description: seasonId is missing or empty.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Season was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/seasons/{seasonId}/enter:
    post:
      tags:
        - Seasons
      summary: Enter a season by paying the entry fee in race coins
      operationId: enterSeason
      security:
        - bearerAuth: []
      parameters:
        - name: seasonId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeasonEnterRequest"
      responses:
        "200":
          description: User entered the season successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeasonEnterResponse"
        "400":
          description: seasonId is missing or empty.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Season was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: User is already entered in this season.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Season is not active or insufficient race coins balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/seasons/{seasonId}/races/start:
    post:
      tags:
        - Seasons
      summary: Start a solo race and receive a server seed
      operationId: startSeasonRace
      security:
        - bearerAuth: []
      parameters:
        - name: seasonId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Race started with a new raceId and seed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RaceStartResponse"
        "400":
          description: seasonId is missing or empty.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: User has not entered this season.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Season was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Season is not active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/seasons/{seasonId}/races/finish:
    post:
      tags:
        - Seasons
      summary: Submit a solo race result
      operationId: finishSeasonRace
      security:
        - bearerAuth: []
      parameters:
        - name: seasonId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RaceFinishRequest"
      responses:
        "200":
          description: Race result recorded and season entry updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RaceFinishResponse"
        "400":
          description: Invalid body, season mismatch, or invalid seed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: User cannot submit this race or is not entered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Season or race was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Race was already finished.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/seasons/{seasonId}/leaderboard:
    get:
      tags:
        - Seasons
      summary: Get season leaderboard with competition ranks
      operationId: getSeasonLeaderboard
      security:
        - bearerAuth: []
      parameters:
        - name: seasonId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
      responses:
        "200":
          description: Top participants and optional current player placement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"
        "400":
          description: seasonId is missing or empty.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Bearer token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Season was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/telegram/webhook:
    post:
      tags:
        - Telegram
      summary: Receive Telegram Bot API webhook updates
      operationId: receiveTelegramWebhook
      security:
        - telegramWebhookSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Update was accepted by the webhook handler.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Telegram webhook secret header is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidSecret:
                  value:
                    code: INVALID_WEBHOOK_SECRET
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    telegramWebhookSecret:
      type: apiKey
      in: header
      name: x-telegram-bot-api-secret-token
  schemas:
    HealthResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
          example: true
    OkResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          enum:
            - INIT_DATA_REQUIRED
            - INIT_DATA_INVALID
            - UNAUTHORIZED
            - USER_NOT_FOUND
            - CAR_ID_REQUIRED
            - CAR_NOT_FOUND
            - CAR_NOT_PURCHASABLE
            - CAR_ALREADY_OWNED
            - INVALID_WEBHOOK_SECRET
            - BUNDLE_ID_REQUIRED
            - BUNDLE_NOT_FOUND
            - INSUFFICIENT_BALANCE
            - SEASON_ID_REQUIRED
            - SEASON_NOT_FOUND
            - SEASON_NOT_ACTIVE
            - ALREADY_ENTERED
            - NOT_ENTERED
            - INVALID_RACE_RESULT
            - RACE_NOT_FOUND
            - RACE_FORBIDDEN
            - RACE_SEASON_MISMATCH
            - INVALID_SEED
            - RACE_ALREADY_FINISHED
    TelegramAuthRequest:
      type: object
      required:
        - initData
      properties:
        initData:
          type: string
          minLength: 1
          description: Raw Telegram Mini App initData query string.
    TelegramAuthResponse:
      type: object
      required:
        - accessToken
        - expiresInSec
        - profile
      properties:
        accessToken:
          type: string
          description: JWT bearer token for API requests.
        expiresInSec:
          type: integer
          example: 43200
        profile:
          $ref: "#/components/schemas/UserProfile"
    UserProfile:
      type: object
      required:
        - userId
        - telegramUserId
        - ownedCarIds
        - garageRevision
        - raceCoinsBalance
      properties:
        userId:
          type: string
          example: usr_123456789
        telegramUserId:
          type: string
          example: "123456789"
        firstName:
          type: string
          nullable: true
          example: Ivan
        username:
          type: string
          nullable: true
          example: ivan_dev
        ownedCarIds:
          type: array
          items:
            type: string
          example:
            - car0
        garageRevision:
          type: integer
          example: 1
        raceCoinsBalance:
          type: integer
          minimum: 0
          example: 0
    GarageResponse:
      type: object
      required:
        - garageRevision
        - cars
        - raceCoinsBalance
      properties:
        garageRevision:
          type: integer
          example: 1
        cars:
          type: array
          items:
            $ref: "#/components/schemas/GarageCar"
        raceCoinsBalance:
          type: integer
          minimum: 0
          example: 50
    GarageCar:
      type: object
      required:
        - carId
        - title
        - owned
        - price
        - canBuy
      properties:
        carId:
          type: string
          example: car1
        title:
          type: string
          example: car1
        owned:
          type: boolean
          example: false
        price:
          $ref: "#/components/schemas/Price"
        canBuy:
          type: boolean
          example: true
    Price:
      type: object
      required:
        - currency
        - amount
      properties:
        currency:
          type: string
          enum:
            - XTR
            - RC
        amount:
          type: integer
          minimum: 0
          example: 25
    StarsPrice:
      type: object
      required:
        - currency
        - amount
      properties:
        currency:
          type: string
          enum:
            - XTR
        amount:
          type: integer
          minimum: 0
          example: 1
    CreateCoinsPurchaseIntentRequest:
      type: object
      required:
        - bundleId
      properties:
        bundleId:
          type: string
          minLength: 1
          example: rc_bundle_100
    CoinsPurchaseIntentResponse:
      type: object
      required:
        - purchaseId
        - status
        - expiresAt
        - price
        - coinsAmount
      properties:
        purchaseId:
          type: string
          example: pur_1
        status:
          type: string
          enum:
            - created
            - invoice_ready
            - pre_checkout_approved
            - paid
            - granted
            - cancelled
            - expired
            - failed
          example: invoice_ready
        invoiceUrl:
          type: string
          format: uri
          nullable: true
          example: https://t.me/invoice/pur_1
        expiresAt:
          type: string
          format: date-time
          example: "2026-04-10T10:15:00.000Z"
        price:
          $ref: "#/components/schemas/StarsPrice"
        coinsAmount:
          type: integer
          minimum: 1
          example: 50
    BuyCarRequest:
      type: object
      required:
        - carId
      properties:
        carId:
          type: string
          minLength: 1
          example: car1
    BuyCarResponse:
      type: object
      required:
        - success
        - carId
        - raceCoinsBalance
        - garageRevision
      properties:
        success:
          type: boolean
          example: true
        carId:
          type: string
          example: car1
        raceCoinsBalance:
          type: integer
          minimum: 0
          example: 25
        garageRevision:
          type: integer
          example: 2
    RaceCoinsBundle:
      type: object
      required:
        - bundleId
        - coins
        - price
        - invoiceTitle
        - invoiceDescription
      properties:
        bundleId:
          type: string
          enum:
            - rc_bundle_100
            - rc_bundle_300
            - rc_bundle_500
            - rc_bundle_1000
          example: rc_bundle_100
        coins:
          type: integer
          minimum: 1
          example: 50
        price:
          $ref: "#/components/schemas/StarsPrice"
        invoiceTitle:
          type: string
          example: "50 Race Coins"
        invoiceDescription:
          type: string
          example: "Get 50 Race Coins"
    SeasonListResponse:
      type: object
      required:
        - seasons
      properties:
        seasons:
          type: array
          items:
            $ref: "#/components/schemas/SeasonListItem"
    SeasonListItem:
      type: object
      required:
        - seasonId
        - title
        - mapId
        - entryFee
        - startsAt
        - endsAt
        - status
        - entered
        - bestScore
        - totalRaces
      properties:
        seasonId:
          type: string
        title:
          type: string
        mapId:
          type: string
        entryFee:
          type: integer
          minimum: 0
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - upcoming
            - active
            - finished
        entered:
          type: boolean
        bestScore:
          type: integer
          nullable: true
        totalRaces:
          type: integer
          nullable: true
    SeasonDetailResponse:
      type: object
      required:
        - seasonId
        - title
        - mapId
        - entryFee
        - startsAt
        - endsAt
        - status
        - entered
        - bestScore
        - totalRaces
      properties:
        seasonId:
          type: string
        title:
          type: string
        mapId:
          type: string
        entryFee:
          type: integer
          minimum: 0
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - upcoming
            - active
            - finished
        entered:
          type: boolean
        bestScore:
          type: integer
          nullable: true
        totalRaces:
          type: integer
          nullable: true
    SeasonEnterRequest:
      type: object
      additionalProperties: false
      description: Empty body; season is determined by the path parameter.
      properties: {}
    SeasonEnterResponse:
      type: object
      required:
        - success
        - seasonId
        - entryId
        - raceCoinsBalance
      properties:
        success:
          type: boolean
          example: true
        seasonId:
          type: string
        entryId:
          type: string
        raceCoinsBalance:
          type: integer
          minimum: 0
    RaceStartResponse:
      type: object
      required:
        - raceId
        - seed
      properties:
        raceId:
          type: string
        seed:
          type: string
    RaceFinishRequest:
      type: object
      required:
        - raceId
        - seed
        - score
      properties:
        raceId:
          type: string
          minLength: 1
        seed:
          type: string
          minLength: 1
        score:
          type: integer
          minimum: 0
    RaceFinishResponse:
      type: object
      required:
        - raceId
        - score
        - isNewBest
        - bestScore
      properties:
        raceId:
          type: string
        score:
          type: integer
          minimum: 0
        isNewBest:
          type: boolean
        bestScore:
          type: integer
          minimum: 0
    LeaderboardResponse:
      type: object
      required:
        - seasonId
        - entries
        - currentPlayer
        - totalParticipants
      properties:
        seasonId:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        currentPlayer:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/LeaderboardEntry"
        totalParticipants:
          type: integer
          minimum: 0
    LeaderboardEntry:
      type: object
      required:
        - rank
        - userId
        - bestScore
        - totalRaces
      properties:
        rank:
          type: integer
          minimum: 1
        userId:
          type: string
        username:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        bestScore:
          type: integer
          minimum: 0
        totalRaces:
          type: integer
          minimum: 0
