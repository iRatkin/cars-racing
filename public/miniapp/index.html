<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Мафынки Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="./telegram-bridge.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #111315;
        color: #f2f4f8;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
      }

      main {
        max-width: 360px;
        padding: 24px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: #b7c0cc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Мафынки</h1>
      <p>Open this Mini App inside Telegram.</p>
    </main>
  </body>
</html>
